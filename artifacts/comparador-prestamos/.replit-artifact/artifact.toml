kind = "web"
previewPath = "/"
title = "Comparador de Préstamos Argentina"
version = "1.0.0"
id = "artifacts/comparador-prestamos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24513

[services.development]
run = "pnpm --filter @workspace/comparador-prestamos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/comparador-prestamos", "run", "build" ]
publicDir = "artifacts/comparador-prestamos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24513"
BASE_PATH = "/"
